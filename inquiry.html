<!-- WhatsApp Logic -->
<script>
document.getElementById('inquiryForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('wa_name').value;
    const contact = document.getElementById('wa_contact').value;
    const message = document.getElementById('wa_message').value;
    
    const text = `*New Inquiry | Achija Jewellers*%0A%0A*Name:* ${name}%0A*Contact:* ${contact}%0A*Message:* ${message}`;
    
    // NOTE TO USER: Replace this placeholder number with the actual WhatsApp number
    // Format: Include country code without any + or 00. Example: 919876543210
    const whatsappNumber = "919265318453"; 
    
    window.open(`https://wa.me/${whatsappNumber}?text=${text}`, '_blank');
});
</script>
